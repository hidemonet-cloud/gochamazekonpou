function getOris({l,w,h}){return[[l,w,h],[l,h,w],[w,l,h],[w,h,l],[h,l,w],[h,w,l]].sort((a,b)=>a[2]-b[2]);}

function packMixed(products,quantities){
  const items=[];
  for(const p of products){const qty=quantities[p.id]||0;for(let i=0;i<qty;i++)items.push({...p,key:`${p.id}-${i}`});}
  if(!items.length)return{placed:[],unplaced:[],usedH:0};
  items.sort((a,b)=>b.l*b.w*b.h-a.l*a.w*a.h);
  const placed=[],unplaced=[];
  let cz=0,clh=0,cy=0,csd=0,cx=0;
  for(const item of items){
    let ok=false;
    for(const [il,iw,ih] of getOris(item)){
      if(il>BOX.l||iw>BOX.w||ih>BOX.h)continue;
      if(cx+il<=BOX.l&&cy+iw<=BOX.w&&cz+Math.max(clh,ih)<=BOX.h){placed.push({...item,x:cx,y:cy,z:cz,il,iw,ih});cx+=il;csd=Math.max(csd,iw);clh=Math.max(clh,ih);ok=true;break;}
      const ncy=cy+csd;
      if(il<=BOX.l&&ncy+iw<=BOX.w&&cz+Math.max(clh,ih)<=BOX.h){placed.push({...item,x:0,y:ncy,z:cz,il,iw,ih});cy=ncy;cx=il;csd=iw;clh=Math.max(clh,ih);ok=true;break;}
      const ncz=cz+clh;
      if(ncz+ih<=BOX.h&&il<=BOX.l&&iw<=BOX.w){placed.push({...item,x:0,y:0,z:ncz,il,iw,ih});cz=ncz;cy=0;cx=il;csd=iw;clh=ih;ok=true;break;}
    }
    if(!ok)unplaced.push(item);
  }
  return{placed,unplaced,usedH:cz+clh};
}

function groupCount(items){return items.reduce((a,i)=>{a[i.id]=(a[i.id]||0)+1;return a;},{});}

function buildLayers(placed){
  const map=new Map();
  for(const item of placed){if(!map.has(item.z))map.set(item.z,[]);map.get(item.z).push(item);}
  return[...map.entries()].sort(([a],[b])=>a-b).map(([z,items],idx)=>{
    const s=[...items].sort((a,b)=>a.y-b.y||a.x-b.x);
    const maxH=Math.max(...items.map(i=>i.ih));
    return{idx,z,topZ:z+maxH,items:s};
  });
}

function posLabel(item){
  const xR=(item.x+item.il/2)/BOX.l,yR=(item.y+item.iw/2)/BOX.w;
  const xL=xR<0.35?"左":xR>0.65?"右":"中央";
  const yL=yR<0.35?"奥":yR>0.65?"手前":"中";
  return yL==="中"&&xL==="中央"?"中央":`${yL}${xL==="中央"?"":xL}`;
}

function Tooltip({tooltip,onClose}){
  if(!tooltip)return null;
  const bs=BS[tooltip.item.brand]||{};
  const TW=190,TH=120;
  const tx=Math.min(Math.max(8,tooltip.x+14),tooltip.cW-TW-8);
  const ty=Math.min(Math.max(8,tooltip.y-TH-10),tooltip.cH-TH-8);
  return(
    <div style={{position:"absolute",left:tx,top:ty,width:TW,zIndex:200,pointerEvents:"auto"}}>
      <div style={{background:"rgba(255,255,255,0.97)",borderRadius:12,padding:"11px 13px",boxShadow:"0 6px 24px rgba(0,0,0,0.22)",border:`2.5px solid ${bs.border||'#ccc'}`,position:"relative"}}>
        <button onClick={e=>{e.stopPropagation();onClose();}} style={{position:"absolute",top:5,right:7,border:"none",background:"none",cursor:"pointer",fontSize:13,color:"#bbb",fontWeight:700}}>✕</button>
        <div style={{fontSize:10,fontWeight:700,color:bs.border,letterSpacing:1,marginBottom:3}}>{tooltip.item.brand.toUpperCase()}</div>
        <div style={{fontSize:14,fontWeight:800,color:"#1a2e4a",marginBottom:8,lineHeight:1.3}}>{tooltip.item.name}</div>
        <div style={{background:bs.bg,borderRadius:7,padding:"5px 8px",marginBottom:5}}>
          <div style={{fontSize:9,color:"#aaa",marginBottom:1}}>商品サイズ (mm)</div>
          <div style={{fontSize:12,fontWeight:700,color:bs.text,fontFamily:"monospace"}}>{tooltip.item.l} × {tooltip.item.w} × {tooltip.item.h}</div>
        </div>
        <div style={{fontSize:10,color:"#aaa",fontFamily:"monospace"}}>配置: {tooltip.item.il}×{tooltip.item.iw}×{tooltip.item.ih}mm</div>
      </div>
    </div>
  );
}

function ThreeView({placed}){
  const mountRef=useRef(null);
  const ctx=useRef({isDragging:false,prev:{x:0,y:0},startPos:{x:0,y:0},group:null,renderer:null,animId:null,camera:null,itemMeshes:[],highlightedMesh:null});
  const [tooltip,setTooltip]=useState(null);
  useEffect(()=>{
    const container=mountRef.current;
    if(!container)return;
    while(container.firstChild)container.removeChild(container.firstChild);
    setTooltip(null);
    const CW=container.clientWidth||360,CH=320;
    const BW=BOX.l*S,BD=BOX.w*S,BH=BOX.h*S;
    const scene=new THREE.Scene();scene.background=new THREE.Color(0xedeae4);
    const camera=new THREE.PerspectiveCamera(40,CW/CH,0.1,200);
    camera.position.set(BW*.6,BH*1.0,BW*1.6);camera.lookAt(0,BH*.4,0);
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(CW,CH);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.shadowMap.enabled=true;container.appendChild(renderer.domElement);
    ctx.current.renderer=renderer;ctx.current.camera=camera;ctx.current.itemMeshes=[];
    scene.add(new THREE.AmbientLight(0xffffff,0.6));
    const sun=new THREE.DirectionalLight(0xfff8f0,0.9);sun.position.set(BW*2,BH*3,BW*2);sun.castShadow=true;scene.add(sun);
    const fill=new THREE.DirectionalLight(0xe8f0ff,0.35);fill.position.set(-BW,BH,-BD);scene.add(fill);
    const group=new THREE.Group();group.rotation.y=0.5;group.rotation.x=-0.12;scene.add(group);ctx.current.group=group;
    const floor=new THREE.Mesh(new THREE.PlaneGeometry(BW,BD),new THREE.MeshLambertMaterial({color:0xd6c8a0}));
    floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;group.add(floor);
    [[BW,BH,0,0,BH/2,-BD/2],[BD,BH,Math.PI/2,-BW/2,BH/2,0],[BD,BH,-Math.PI/2,BW/2,BH/2,0]].forEach(([w,h,ry,px,py,pz])=>{
      const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshLambertMaterial({color:0xc8b880,transparent:true,opacity:.18,side:THREE.DoubleSide}));
      m.rotation.y=ry;m.position.set(px,py,pz);group.add(m);
    });
    const wire=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(BW,BH,BD)),new THREE.LineBasicMaterial({color:0x1a2e4a}));
    wire.position.set(0,BH/2,0);group.add(wire);
    const gMat=new THREE.LineBasicMaterial({color:0xbbaa88,transparent:true,opacity:.35});
    for(let i=0;i<=6;i++){
      const xp=-BW/2+BW*i/6,zp=-BD/2+BD*i/6;
      group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(xp,.002,-BD/2),new THREE.Vector3(xp,.002,BD/2)]),gMat));
      group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-BW/2,.002,zp),new THREE.Vector3(BW/2,.002,zp)]),gMat));
    }
    for(const item of placed){
      const iW=item.il*S,iH=item.ih*S,iD=item.iw*S;
      const color=BS[item.brand]?.hex||0x888888;
      const geo=new THREE.BoxGeometry(iW-.008,iH-.008,iD-.008);
      const mat=new THREE.MeshLambertMaterial({color,transparent:true,opacity:.88});
      const mesh=new THREE.Mesh(geo,mat);
      mesh.position.set((item.x+item.il/2)*S-BW/2,(item.z+item.ih/2)*S,(item.y+item.iw/2)*S-BD/2);
      mesh.userData={item};mesh.castShadow=true;group.add(mesh);ctx.current.itemMeshes.push(mesh);
      const el2=new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:0x000000,transparent:true,opacity:.18}));
      el2.position.copy(mesh.position);group.add(el2);
    }
    const animate=()=>{ctx.current.animId=requestAnimationFrame(animate);renderer.render(scene,camera);};animate();
    const el=renderer.domElement,c=ctx.current;
    const getP=(e)=>e.touches?e.touches[0]:e;
    const setHL=(mesh,on)=>{if(!mesh)return;mesh.material.emissive.set(on?0x3a3a3a:0x000000);mesh.material.opacity=on?1.0:.88;mesh.material.needsUpdate=true;};
    const clearHL=()=>{if(c.highlightedMesh){setHL(c.highlightedMesh,false);c.highlightedMesh=null;}};
    const doRay=(clientX,clientY)=>{
      const rect=el.getBoundingClientRect();
      const nx=((clientX-rect.left)/rect.width)*2-1,ny=-((clientY-rect.top)/rect.height)*2+1;
      const ray=new THREE.Raycaster();ray.setFromCamera(new THREE.Vector2(nx,ny),c.camera);
      const hits=ray.intersectObjects(c.itemMeshes);
      return{hit:hits.length>0?hits[0].object:null,relX:clientX-rect.left,relY:clientY-rect.top,cW:rect.width,cH:rect.height};
    };
    const onHover=(e)=>{if(c.isDragging)return;const{hit}=doRay(e.clientX,e.clientY);el.style.cursor=hit?"pointer":"grab";if(hit!==c.highlightedMesh){clearHL();if(hit){setHL(hit,true);c.highlightedMesh=hit;}}};
    const onDown=(e)=>{c.isDragging=true;const p=getP(e);c.prev={x:p.clientX,y:p.clientY};c.startPos={x:p.clientX,y:p.clientY};el.style.cursor="grabbing";e.preventDefault();};
    const onMove=(e)=>{if(!c.isDragging||!c.group)return;const p=getP(e);const dx=p.clientX-c.prev.x,dy=p.clientY-c.prev.y;c.group.rotation.y+=dx*.008;c.group.rotation.x+=dy*.008;c.group.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/3,c.group.rotation.x));c.prev={x:p.clientX,y:p.clientY};e.preventDefault();};
    const onUp=(e)=>{c.isDragging=false;el.style.cursor="grab";const p=e.changedTouches?e.changedTouches[0]:e;if(Math.abs(p.clientX-c.startPos.x)<8&&Math.abs(p.clientY-c.startPos.y)<8){const{hit,relX,relY,cW,cH}=doRay(p.clientX,p.clientY);clearHL();if(hit){setHL(hit,true);c.highlightedMesh=hit;setTooltip({item:hit.userData.item,x:relX,y:relY,cW,cH});}else{setTooltip(null);}}};
    el.addEventListener("mousemove",onHover);el.addEventListener("mousedown",onDown,{passive:false});
    window.addEventListener("mousemove",onMove,{passive:false});window.addEventListener("mouseup",onUp);
    el.addEventListener("touchstart",onDown,{passive:false});window.addEventListener("touchmove",onMove,{passive:false});window.addEventListener("touchend",onUp);
    return()=>{
      cancelAnimationFrame(ctx.current.animId);
      el.removeEventListener("mousemove",onHover);el.removeEventListener("mousedown",onDown);
      window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);
      el.removeEventListener("touchstart",onDown);window.removeEventListener("touchmove",onMove);window.removeEventListener("touchend",onUp);
      renderer.dispose();if(container.contains(el))container.removeChild(el);
    };
  },[placed]);
  return(
    <div style={{position:"relative",userSelect:"none"}}>
      <div ref={mountRef} style={{width:"100%",height:320,borderRadius:8,overflow:"hidden",cursor:"grab",background:"#edeae4"}}>
        {placed.length===0&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:320,color:"#aaa",fontSize:13}}>商品を追加すると3D表示されます</div>}
      </div>
      <Tooltip tooltip={tooltip} onClose={()=>setTooltip(null)}/>
      {placed.length>0&&<>
        <div style={{position:"absolute",bottom:8,right:8,fontSize:9,color:"#888",background:"rgba(255,255,255,0.88)",padding:"3px 8px",borderRadius:10}}>ドラッグ：回転　タップ：商品確認</div>
        <div style={{position:"absolute",top:8,left:8,display:"flex",flexDirection:"column",gap:3}}>
          {BRANDS.filter(b=>placed.some(p=>p.brand===b)).map(b=>(
            <div key={b} style={{display:"flex",alignItems:"center",gap:4,background:"rgba(255,255,255,0.88)",padding:"2px 7px",borderRadius:8,fontSize:9,color:BS[b].text}}>
              <div style={{width:8,height:8,borderRadius:2,background:`#${BS[b].hex.toString(16).padStart(6,'0')}`}}/>
              {b}
            </div>
          ))}
        </div>
      </>}
    </div>
  );
}

function TopView({placed}){
  const SC=.44,W=BOX.l*SC,H=BOX.w*SC;
  return(
    <svg width={W+4} height={H+20} style={{display:"block",margin:"0 auto"}}>
      <rect x={2} y={2} width={W} height={H} fill="#fafaf8" stroke="#1a2e4a" strokeWidth={2} rx={2}/>
      {placed.map(item=>{const b=BS[item.brand]||{};const px=2+item.x*SC,py=2+item.y*SC,pw=item.il*SC,ph=item.iw*SC;return(
        <g key={item.key}>
          <rect x={px} y={py} width={pw} height={ph} fill={b.light||"#ccc"} stroke={b.border||"#888"} strokeWidth={0.8} opacity={0.85} rx={1}/>
          {pw>20&&ph>12&&<text x={px+pw/2} y={py+ph/2} textAnchor="middle" dominantBaseline="middle" fontSize={6.5} fill={b.text||"#333"} fontWeight="700">{item.brand.slice(0,2)}</text>}
        </g>
      );})}
      <text x={W/2+2} y={H+17} textAnchor="middle" fontSize={8} fill="#aaa">← 590mm →</text>
    </svg>
  );
}

function LayerMiniView({items,stepNums}){
  const SC=.38,W=BOX.l*SC,H=BOX.w*SC;
  return(
    <svg width={W+4} height={H+20} style={{display:"block",margin:"0 auto"}}>
      <rect x={2} y={2} width={W} height={H} fill="#f5f3ee" stroke="#ccc" strokeWidth={1} rx={2} strokeDasharray="4 2"/>
      {items.map((item,i)=>{const b=BS[item.brand]||{};const px=2+item.x*SC,py=2+item.y*SC,pw=item.il*SC,ph=item.iw*SC;const num=stepNums[i];return(
        <g key={item.key}>
          <rect x={px} y={py} width={pw} height={ph} fill={b.light||"#ccc"} stroke={b.border||"#888"} strokeWidth={1} opacity={0.92} rx={1}/>
          <circle cx={px+12} cy={py+11} r={8} fill={b.border||"#888"}/>
          <text x={px+12} y={py+11} textAnchor="middle" dominantBaseline="middle" fontSize={7} fill="#fff" fontWeight="800">{num}</text>
        </g>
      );})}
      <text x={W/2+2} y={H+17} textAnchor="middle" fontSize={7} fill="#aaa">← 590mm →</text>
    </svg>
  );
}

function PackingGuide({placed}){
  if(!placed.length)return null;
  const layers=buildLayers(placed);
  let stepCounter=1;
  return(
    <div id="packing-guide">
      <div style={{background:"#1a2e4a",borderRadius:"10px 10px 0 0",padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:13,fontWeight:800,color:"#fff"}}>📋 梱包手順書</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.55)",marginTop:2}}>全{placed.length}個 ／ {layers.length}段積み ／ 使用高さ {Math.max(...placed.map(i=>i.z+i.ih))}mm</div>
        </div>
        <button onClick={()=>window.print()} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:7,padding:"5px 10px",color:"#fff",cursor:"pointer",fontSize:10,fontWeight:600}}>🖨 印刷</button>
      </div>
      <div style={{background:"#f8f6f2",border:"1px solid #e8e4dc",borderTop:"none",padding:"7px 12px",display:"flex",gap:8,flexWrap:"wrap"}}>
        <span style={{fontSize:9,color:"#888"}}>段ボールの正面側が「手前」、奥側が「奥」です</span>
        <span style={{fontSize:9,color:"#555",fontWeight:600}}>①②③の番号順に置いてください</span>
      </div>
      {layers.map((layer,lIdx)=>{
        const isFirst=lIdx===0;
        const stepNums=layer.items.map(()=>stepCounter++);
        const bc=isFirst?"#e07a2a":"#1a2e4a";
        return(
          <div key={layer.z} style={{border:`1.5px solid ${bc}`,borderTop:"none",background:"#fff"}}>
            <div style={{background:isFirst?"#fff4e6":"#eef2f8",borderBottom:`1px solid ${bc}22`,padding:"9px 14px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <div style={{background:bc,color:"#fff",borderRadius:16,padding:"3px 10px",fontSize:11,fontWeight:800,whiteSpace:"nowrap"}}>{isFirst?"第1段（最初）":`第${lIdx+1}段`}</div>
              <div style={{fontSize:10,color:"#888"}}>高さ <b style={{color:"#333"}}>{layer.z}</b>mm ～ <b style={{color:"#333"}}>{layer.topZ}</b>mm（厚み{layer.topZ-layer.z}mm）</div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap"}}>
              <div style={{padding:"10px 6px 6px 12px",flexShrink:0}}>
                <div style={{fontSize:8,color:"#aaa",marginBottom:3,textAlign:"center"}}>配置図（上から）</div>
                <LayerMiniView items={layer.items} stepNums={stepNums}/>
              </div>
              <div style={{flex:1,padding:"10px 12px 10px 6px",minWidth:180}}>
                <div style={{fontSize:9,color:"#aaa",marginBottom:6,fontWeight:600}}>この段に入れるもの（{layer.items.length}個）</div>
                {layer.items.map((item,i)=>{
                  const bs=BS[item.brand]||{};const num=stepNums[i];const pos=posLabel(item);
                  return(
                    <div key={item.key} style={{display:"flex",alignItems:"center",gap:7,marginBottom:6,padding:"5px 8px",background:bs.bg,borderRadius:7,border:`1px solid ${bs.border}22`}}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:bs.border,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <span style={{fontSize:10,fontWeight:800,color:"#fff"}}>{num}</span>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,fontWeight:700,color:bs.text}}>{item.name}</div>
                        <div style={{fontSize:9,color:"#aaa",fontFamily:"monospace"}}>{item.il}×{item.iw}×{item.ih}mm</div>
                      </div>
                      <div style={{background:"#fff",border:`1px solid ${bs.border}`,borderRadius:5,padding:"2px 6px",fontSize:9,fontWeight:700,color:bs.border,flexShrink:0}}>{pos}</div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={{borderTop:`1px solid ${bc}22`,padding:"5px 12px",background:"#fafaf8",display:"flex",alignItems:"center",gap:7}}>
              <input type="checkbox" id={`layer-${lIdx}`} style={{width:15,height:15,cursor:"pointer"}}/>
              <label htmlFor={`layer-${lIdx}`} style={{fontSize:10,color:"#888",cursor:"pointer"}}>第{lIdx+1}段　完了</label>
            </div>
          </div>
        );
      })}
      <div style={{background:"#eaf4ee",border:"1.5px solid #6ab87a",borderRadius:"0 0 10px 10px",borderTop:"none",padding:"11px 14px",display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:18}}>✅</span>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:"#2d7a3a"}}>梱包完了！ふたを閉めてテープで封をしてください</div>
          <div style={{fontSize:9,color:"#888",marginTop:2}}>合計 {placed.length}個　使用高さ {Math.max(...placed.map(i=>i.z+i.ih))}mm / 530mm</div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [quantities,setQuantities]=useState(Object.fromEntries(PRODUCTS.map(p=>[p.id,0])));
  const [view,setView]=useState("3d");
  const setQty=(id,d)=>setQuantities(prev=>({...prev,[id]:Math.max(0,(prev[id]||0)+d)}));
  const setDirect=(id,v)=>setQuantities(prev=>({...prev,[id]:Math.max(0,parseInt(v)||0)}));
  const reset=()=>setQuantities(Object.fromEntries(PRODUCTS.map(p=>[p.id,0])));
  const result=useMemo(()=>packMixed(PRODUCTS,quantities),[quantities]);
  const total=Object.values(quantities).reduce((s,v)=>s+v,0);
  const pc=groupCount(result.placed),uc=groupCount(result.unplaced);
  const vol=result.placed.reduce((s,i)=>s+i.l*i.w*i.h,0);
  const fill=vol/BOX_VOL,allFit=result.unplaced.length===0;
  return(
    <div style={{fontFamily:"'Helvetica Neue',Arial,sans-serif",background:"#f5f3ee",minHeight:"100vh"}}>
      <div className="no-print" style={{background:"#1a2e4a",color:"#fff",padding:"14px 16px 11px",position:"sticky",top:0,zIndex:100}}>
        <div style={{fontSize:8,opacity:.5,letterSpacing:2,fontFamily:"monospace",marginBottom:2}}>EIKODO × HAPINOWA — FBA 160SIZE</div>
        <div style={{fontSize:16,fontWeight:700}}>ごちゃまぜ梱包シミュレーター</div>
        <div style={{fontSize:9,opacity:.5,marginTop:2}}>内寸 590×390×530mm</div>
      </div>
      <div style={{padding:12}}>
        <div className="no-print">
        {BRANDS.map(brand=>{const bs=BS[brand];return(
          <div key={brand} style={{background:"#fff",borderRadius:10,marginBottom:9,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
            <div style={{background:bs.bg,borderBottom:`2px solid ${bs.border}`,padding:"6px 12px",display:"flex",alignItems:"center",gap:7}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:bs.border}}/>
              <span style={{fontSize:12,fontWeight:700,color:bs.text}}>{brand}</span>
            </div>
            {PRODUCTS.filter(p=>p.brand===brand).map(p=>{const qty=quantities[p.id]||0;return(
              <div key={p.id} style={{display:"flex",alignItems:"center",padding:"8px 12px",borderBottom:"1px solid #f5f2ec",gap:8}}>
                <div style={{flex:1,fontSize:12,color:qty>0?bs.text:"#444",fontWeight:qty>0?600:400}}>{p.name}</div>
                <div style={{fontSize:8,color:"#ccc",fontFamily:"monospace",whiteSpace:"nowrap"}}>{p.l}×{p.w}×{p.h}</div>
                <div style={{display:"flex",alignItems:"center"}}>
                  <button onClick={()=>setQty(p.id,-1)} style={{width:30,height:30,border:"none",background:"#eee",borderRadius:"6px 0 0 6px",cursor:"pointer",fontSize:17,fontWeight:700,color:qty===0?"#ccc":"#555",lineHeight:1}}>−</button>
                  <input type="number" value={qty} onChange={e=>setDirect(p.id,e.target.value)} style={{width:40,height:30,textAlign:"center",border:"1px solid #ddd",borderLeft:"none",borderRight:"none",fontSize:14,fontWeight:700,color:qty>0?bs.text:"#555",background:qty>0?bs.bg:"#fff"}}/>
                  <button onClick={()=>setQty(p.id,1)} style={{width:30,height:30,border:"none",background:bs.border,borderRadius:"0 6px 6px 0",cursor:"pointer",fontSize:17,fontWeight:700,color:"#fff",lineHeight:1}}>＋</button>
                </div>
              </div>
            );})}
          </div>
        );})}
        {total>0&&<button onClick={reset} style={{width:"100%",padding:"8px",marginBottom:12,background:"#fff",border:"1.5px solid #ddd",borderRadius:8,cursor:"pointer",fontSize:11,color:"#aaa"}}>🔄 リセット</button>}
        {total>0&&<>
          <div style={{background:allFit?"#eaf4ee":"#fdf0ee",border:`2px solid ${allFit?"#6ab87a":"#e07060"}`,borderRadius:10,padding:"11px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:24}}>{allFit?"✅":"⚠️"}</div>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:allFit?"#2d7a3a":"#c03a2a"}}>{allFit?`全${total}個が収まります！`:`${result.placed.length}個は収まりますが${result.unplaced.length}個入りません`}</div>
              <div style={{fontSize:10,color:"#888",marginTop:2}}>充填率 {(fill*100).toFixed(1)}%　使用高さ {result.usedH}mm / 530mm</div>
            </div>
          </div>
          <div style={{display:"flex",gap:7,marginBottom:10}}>
            {[{l:"梱包個数",v:`${result.placed.length}個`,s:`依頼${total}個中`},{l:"充填率",v:`${(fill*100).toFixed(1)}%`,s:`${(vol/1e6).toFixed(1)}L`},{l:"使用高さ",v:`${result.usedH}mm`,s:`残り${530-result.usedH}mm`}].map(s=>(
              <div key={s.l} style={{flex:1,background:"#fff",borderRadius:8,padding:"8px 9px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",borderTop:"3px solid #1a2e4a"}}>
                <div style={{fontSize:9,color:"#888"}}>{s.l}</div>
                <div style={{fontSize:16,fontWeight:800,color:"#1a2e4a"}}>{s.v}</div>
                <div style={{fontSize:9,color:"#aaa"}}>{s.s}</div>
              </div>
            ))}
          </div>
          <div style={{background:"#fff",borderRadius:10,padding:12,marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
            <div style={{display:"flex",gap:0,marginBottom:10,background:"#f5f3ee",borderRadius:7,padding:3}}>
              {[["3d","🎲 3D"],["top","🗺 平面図"]].map(([v,label])=>(
                <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"6px 0",border:"none",cursor:"pointer",borderRadius:5,fontSize:11,fontWeight:view===v?700:400,background:view===v?"#1a2e4a":"transparent",color:view===v?"#fff":"#888"}}>
                  {label}
                </button>
              ))}
            </div>
            {view==="3d"?<ThreeView placed={result.placed}/>:<div style={{overflowX:"auto"}}><TopView placed={result.placed}/></div>}
          </div>
          <div style={{background:"#fff",borderRadius:10,padding:12,marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#666",fontFamily:"monospace",marginBottom:8}}>梱包内訳</div>
            {PRODUCTS.filter(p=>(pc[p.id]||0)+(uc[p.id]||0)>0).map(p=>{const pq=pc[p.id]||0,uq=uc[p.id]||0,bs=BS[p.brand];return(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",padding:"7px 0",borderBottom:"1px solid #f5f3ee"}}>
                <div style={{flex:1,fontSize:12,color:"#333",minWidth:130}}>{p.name}</div>
                {pq>0&&<span style={{background:bs.bg,padding:"2px 9px",borderRadius:10,border:`1px solid ${bs.border}`,fontSize:11,fontWeight:700,color:bs.text}}>✓ {pq}個</span>}
                {uq>0&&<span style={{background:"#fdf0ee",padding:"2px 9px",borderRadius:10,border:"1px solid #e07060",fontSize:11,fontWeight:700,color:"#c03a2a"}}>✗ {uq}個超過</span>}
              </div>
            );})}
          </div>
        </>}
        {total===0&&<div style={{textAlign:"center",padding:"40px 16px",color:"#ccc",fontSize:12}}>＋ボタンで商品を追加してください</div>}
        </div>
        {total>0&&result.placed.length>0&&<PackingGuide placed={result.placed}/>}
        <div className="no-print" style={{fontSize:9,color:"#ccc",lineHeight:1.8,marginTop:12}}>※ シェルフ方式の理論値です。実際の梱包では緩衝材・Amazon納品ルールにより変わる場合があります。</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
